name: CI Pipeline 

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v3

      - name: Build Docker Image 
        run: docker build -t static-site .

      - name: Run containers
        run: docker run -d -p 8081:80 static-site
        
